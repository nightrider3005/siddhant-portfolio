<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e0b1f"/>
      <stop offset="100%" style="stop-color:#070711"/>
    </linearGradient>

    <!-- Purple glow gradient for text -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e090ff"/>
      <stop offset="100%" style="stop-color:#c678dd"/>
    </linearGradient>

    <!-- Border gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c678dd;stop-opacity:0.9"/>
      <stop offset="50%" style="stop-color:#9a4db5;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#c678dd;stop-opacity:0.8"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft shadow -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>

  <!-- Inner subtle grid lines -->
  <line x1="0" y1="32" x2="64" y2="32" stroke="rgba(198,120,221,0.06)" stroke-width="0.5"/>
  <line x1="32" y1="0" x2="32" y2="64" stroke="rgba(198,120,221,0.06)" stroke-width="0.5"/>

  <!-- Purple glow blob behind text -->
  <ellipse cx="32" cy="32" rx="22" ry="22" fill="rgba(198,120,221,0.07)" filter="url(#softGlow)"/>

  <!-- Border ring -->
  <rect x="2" y="2" width="60" height="60" rx="12.5" ry="12.5"
        fill="none"
        stroke="url(#borderGrad)"
        stroke-width="1.2"
        opacity="0.85"/>

  <!-- Corner accent dots -->
  <circle cx="8"  cy="8"  r="1.2" fill="#c678dd" opacity="0.5"/>
  <circle cx="56" cy="8"  r="1.2" fill="#c678dd" opacity="0.5"/>
  <circle cx="8"  cy="56" r="1.2" fill="#c678dd" opacity="0.5"/>
  <circle cx="56" cy="56" r="1.2" fill="#c678dd" opacity="0.5"/>

  <!-- "SG" text — bold, centered, with glow -->
  <text
    x="32" y="39"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="24"
    font-weight="800"
    text-anchor="middle"
    fill="url(#textGrad)"
    filter="url(#glow)"
    letter-spacing="-1"
  >SG</text>

  <!-- Subtle underline accent under SG -->
  <rect x="19" y="42" width="26" height="1.5" rx="1"
        fill="url(#textGrad)" opacity="0.55"/>

  <!-- Tiny dot on underline — like the site's divider -->
  <circle cx="32" cy="42.75" r="2" fill="#c678dd" opacity="0.9"/>
</svg>
