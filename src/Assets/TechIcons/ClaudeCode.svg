<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#0D0D0D"/>
  <!-- Terminal window frame -->
  <rect x="12" y="22" width="76" height="56" rx="8" fill="#1A1A1A" stroke="#333" stroke-width="1.5"/>
  <!-- Title bar -->
  <rect x="12" y="22" width="76" height="14" rx="8" fill="#252525"/>
  <rect x="12" y="29" width="76" height="7" fill="#252525"/>
  <!-- Traffic lights -->
  <circle cx="24" cy="29" r="3.5" fill="#FF5F57"/>
  <circle cx="34" cy="29" r="3.5" fill="#FFBD2E"/>
  <circle cx="44" cy="29" r="3.5" fill="#28CA41"/>
  <!-- Code lines with Claude amber color -->
  <text x="20" y="52" font-family="monospace" font-size="11" fill="#F59E0B">$ claude</text>
  <text x="20" y="64" font-family="monospace" font-size="10" fill="#6EE7B7">&#x203A; ready</text>
  <!-- Cursor blink -->
  <rect x="20" y="70" width="7" height="10" rx="1" fill="#F59E0B" opacity="0.9"/>
</svg>